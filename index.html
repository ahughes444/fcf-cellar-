// ─── Rack Geometry ────────────────────────────────────────────────
function getColumnsForRow(rack, row) {
  if (rack === "A") {
    if (row <= 11) return 22;
    const step = row - 11;
    const cols = Math.round(22 - step * (18 / 16));
    return Math.max(4, cols);
  }
  if (rack === "B") {
    if (row <= 11) return 10;
    const step = row - 11;
    const cols = Math.round(10 - step * (9 / 8));
    return Math.max(1, cols);
  }
  if (rack === "C") return 4;
  if (rack === "Mag") {
    if (row <= 2) return 2;
    return row <= 5 ? 2 : 1;
  }
  return 0;
}

const RACK_ROWS = { A: 27, B: 19, C: 27, Mag: 5 };
const RACKS = ["A", "B", "C", "Mag"];

function fmtLoc(rack, row, col) {
  return `${rack}-${String(row).padStart(2,"0")}-${String(col).padStart(2,"0")}`;
}

function slotKey(rack, row, col) { return `${rack}-${row}-${col}`; }

// ─── CellarTracker Rating Fetch ──────────────────────────────────
function normalizeWineName(s) {
  return (s || "").toLowerCase().replace(/[^a-z0-9]/g, "").trim();
}

function matchScore(ctWine, ctVintage, cellarWine) {
  var cn = normalizeWineName(ctWine);
  var pn = normalizeWineName(cellarWine.producer);
  if (!cn || !pn) return 0;
  var score = 0;
  // Check if one contains the other
  if (cn.includes(pn) || pn.includes(cn)) score += 3;
  // Check word overlap
  var cWords = cn.match(/[a-z]{3,}/g) || [];
  var pWords = pn.match(/[a-z]{3,}/g) || [];
  var overlap = cWords.filter(function(w) { return pWords.indexOf(w) >= 0; }).length;
  score += overlap;
  // Vintage match bonus
  if (ctVintage && cellarWine.vintage && String(ctVintage) === String(cellarWine.vintage)) score += 5;
  return score;
}

async function fetchCTRatings(ctUser, ctPass) {
  // Try multiple CORS proxies
  var baseUrl = "https://www.cellartracker.com/xlquery.asp?User=" + encodeURIComponent(ctUser) + "&Password=" + encodeURIComponent(ctPass) + "&Format=tab&Table=List&Location=1";
  var proxies = [
    "https://corsproxy.io/?" + encodeURIComponent(baseUrl),
    "https://api.allorigins.win/raw?url=" + encodeURIComponent(baseUrl),
  ];
  var lastErr = null;
  for (var i = 0; i < proxies.length; i++) {
    try {
      var resp = await fetch(proxies[i]);
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      var text = await resp.text();
      if (text.length < 50 || text.indexOf("Wine") < 0) throw new Error("Invalid response");
      return text;
    } catch(e) { lastErr = e; }
  }
  throw new Error("Could not fetch from CellarTracker. " + (lastErr ? lastErr.message : "") + " Try the manual paste option instead.");
}

function parseCTData(tabText) {
  var lines = tabText.split("\n");
  if (lines.length < 2) return [];
  var headers = lines[0].split("\t").map(function(h) { return h.trim().replace(/"/g, ""); });
  var wineIdx = -1, vintageIdx = -1, scoreIdx = -1, priceIdx = -1;
  for (var i = 0; i < headers.length; i++) {
    var h = headers[i].toLowerCase();
    if (h === "wine" || h === "winename") wineIdx = i;
    if (h === "vintage") vintageIdx = i;
    if (h === "ct" || h === "score" || h === "communityscore" || h === "myrating" || h.indexOf("score") >= 0 || h.indexOf("rating") >= 0) { if (scoreIdx < 0) scoreIdx = i; }
    if (h === "price" || h === "valuation" || h.indexOf("price") >= 0) { if (priceIdx < 0) priceIdx = i; }
  }
  // Fallback: look harder
  if (wineIdx < 0) { for (var j = 0; j < headers.length; j++) { if (headers[j].toLowerCase().indexOf("wine") >= 0) { wineIdx = j; break; } } }
  if (scoreIdx < 0) { for (var j = 0; j < headers.length; j++) { if (headers[j].toLowerCase().indexOf("ct") >= 0 || headers[j].toLowerCase().indexOf("score") >= 0) { scoreIdx = j; break; } } }
  var results = [];
  for (var r = 1; r < lines.length; r++) {
    var cols = lines[r].split("\t").map(function(c) { return c.trim().replace(/^"|"$/g, ""); });
    if (cols.length < 3) continue;
    var wineName = wineIdx >= 0 ? cols[wineIdx] : "";
    var vintage = vintageIdx >= 0 ? cols[vintageIdx] : "";
    var score = scoreIdx >= 0 ? cols[scoreIdx] : "";
    var price = priceIdx >= 0 ? cols[priceIdx] : "";
    if (wineName) results.push({ wine: wineName, vintage: vintage, score: score, price: price });
  }
  return results;
}

function matchCTRatingsToWines(ctData, wines) {
  var updates = {};
  var wineList = Object.values(wines);
  for (var i = 0; i < wineList.length; i++) {
    var w = wineList[i];
    var bestScore = 0;
    var bestMatch = null;
    for (var j = 0; j < ctData.length; j++) {
      var s = matchScore(ctData[j].wine, ctData[j].vintage, w);
      if (s > bestScore) { bestScore = s; bestMatch = ctData[j]; }
    }
    if (bestMatch && bestScore >= 4 && bestMatch.score) {
      updates[w.id] = { cellarTrackerRating: bestMatch.score, marketPrice: bestMatch.price || w.marketPrice || "" };
    }
  }
  return updates;
}

// ─── Claude Vision: analyze wine label ──────────────────────────
async function analyzeWineLabel(apiKey, imageBase64, mimeType) {
  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1024,
      messages: [{
        role: "user",
        content: [
          { type: "image", source: { type: "base64", media_type: mimeType, data: imageBase64 } },
          { type: "text", text: `You are a wine expert. Analyze this wine label photo and extract the following details. Return ONLY a JSON object with these exact keys (use empty string if not found):
{
  "producer": "the winery/producer name",
  "vineyard": "specific vineyard name if shown",
  "vintage": "the year (4 digits)",
  "grape": "grape varietal(s)",
  "region": "wine region (e.g. Napa Valley, Barossa Valley, Bordeaux)",
  "country": "country of origin",
  "provenance": "any appellation or classification info (e.g. Grand Cru, DOC, AVA)"
}
Return ONLY the JSON, no markdown fences, no explanation.` }
        ]
      }]
    })
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error((err && err.error && err.error.message) || ("API error: " + resp.status));
  }
  const data = await resp.json();
  const text = (data.content && data.content[0] && data.content[0].text) || "";
  // Parse JSON from response, handling possible markdown fences
  const cleaned = text.replace(/```json\n?/g, "").replace(/```\n?/g, "").trim();
  return JSON.parse(cleaned);
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const result = reader.result;
      const base64 = result.split(",")[1];
      resolve({ base64, mimeType: file.type });
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function wineColor(wine) {
  if (!wine) return "#1a1a2e";
  const g = (wine.grape || "").toLowerCase();
  const reds = ["cabernet","merlot","pinot noir","syrah","shiraz","malbec","tempranillo","sangiovese","nebbiolo","zinfandel","grenache","mourvèdre","mourvedre","barbera","carmenere","petit verdot","pinotage"];
  const whites = ["chardonnay","sauvignon blanc","riesling","pinot grigio","pinot gris","viognier","chenin","gewurz","moscato","semillon","blanc","gruner","albarino","vermentino","trebbiano"];
  if (reds.some(r => g.includes(r))) return "#722f37";
  if (whites.some(w => g.includes(w))) return "#c9b037";
  if (g.includes("rosé") || g.includes("rose")) return "#e8a0bf";
  if (wine.producer) return "#5c374c";
  return "#1a1a2e";
}

function useScreenSize() {
  const [size, setSize] = useState({ w: window.innerWidth, h: window.innerHeight });
  useEffect(() => {
    const onResize = () => setSize({ w: window.innerWidth, h: window.innerHeight });
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);
  return { ...size, isMobile: size.w < 600, isTablet: size.w >= 600 && size.w < 1024, isTouchDevice: 'ontouchstart' in window };
}

              <div style={{ fontSize: 11, color: "#8a7a9e", marginTop: 6 }}>

              </div>
            </div>

            <div style={{ borderTop: "1px solid #e8e0f0", paddingTop: 16, marginBottom: 16 }}>

              <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                <div style={{ flex: 1 }}>

                <div style={{ flex: 1 }}>
                  <label style={labelStyle}>Password</label>
                  <input type="password" value={ctCreds.pass} onChange={e => updateCtCreds(ctCreds.user, e.target.value)}
                    style={inputStyle} placeholder="••••••" />
                </div>
              </div>
              <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 8 }}>
                <button onClick={() => fetchRatings(null)} disabled={ctStatus && ctStatus.type === "loading"}
                  style={btnStyle("#5a2890", "#ffffff")}>
                  {ctStatus && ctStatus.type === "loading" ? "Fetching..." : "Fetch Ratings"}
                </button>
                <span style={{ fontSize: 11, color: "#8a7a9e" }}>or</span>
                <label style={{ ...btnStyle("#f4f0fa", "#5a4a70"), cursor: "pointer", display: "inline-block" }}>
                  Paste CT Export
                  <input type="file" accept=".csv,.tsv,.txt,.tab" style={{ display: "none" }}
                    onChange={e => {
                      var file = e.target.files[0]; if (!file) return;
                      var reader = new FileReader();
                      reader.onload = function(ev) { fetchRatings(ev.target.result); };
                      reader.readAsText(file);
                      e.target.value = "";
                    }} />
                </label>
              </div>
              {ctStatus && (
                <div style={{ fontSize: 11, padding: "6px 10px", borderRadius: 6, marginTop: 4,
                  background: ctStatus.type === "ok" ? "#e8f5e0" : ctStatus.type === "error" ? "#fde8e8" : ctStatus.type === "warn" ? "#fef3cd" : "#e8e0f0",
                  color: ctStatus.type === "ok" ? "#207020" : ctStatus.type === "error" ? "#a02020" : ctStatus.type === "warn" ? "#856404" : "#5a4a70" }}>
                  {ctStatus.text}
                </div>
              )}
              <div style={{ fontSize: 10, color: "#8a7a9e", marginTop: 6 }}>
                Fetches community ratings from CellarTracker and matches to your wines. Credentials stored locally only. If fetch fails due to CORS, use the file upload option with a CellarTracker CSV export.
              </div>
            </div>

            <div style={{ display: "flex", justifyContent: "flex-end" }}>
              <button onClick={() => setShowSettings(false)} style={btnStyle("#722f37", "#ffffff")}>Done</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Visual Cellar ────────────────────────────────────────────────
function CellarView({ winesBySlot, onSelect, screen }) {
  const [hoveredSlot, setHoveredSlot] = useState(null);
  const [tooltipPos, setTooltipPos] = useState({ x: 0, y: 0 });
  const [tappedSlot, setTappedSlot] = useState(null);
  const isTouchDevice = screen.isTouchDevice;
  const isMobile = screen.isMobile;

  const handleSlotTap = (rack, row, col) => {
    if (isTouchDevice) {
      const key = slotKey(rack, row, col);
      if (tappedSlot === key) {
        // Second tap — open the modal
        onSelect({ rack, row, col });
        setTappedSlot(null);
        setHoveredSlot(null);
      } else {
        // First tap — show tooltip
        setTappedSlot(key);
        setHoveredSlot({ rack, row, col });
      }
    } else {
      onSelect({ rack, row, col });
    }
  };

  return (
    <div onMouseMove={e => setTooltipPos({ x: e.clientX, y: e.clientY })}
      onTouchStart={() => {}} /* enable touch events */>
      {/* Legend */}
      <div style={{ display: "flex", gap: 12, marginBottom: 12, flexWrap: "wrap", alignItems: "center" }}>
        {[["#722f37","Red"],["#c9b037","White"],["#e8a0bf","Rosé"],["#5c374c","Other"]].map(([c,l]) => (
          <div key={l} style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <div style={{ width: 12, height: 12, borderRadius: "50%", background: c, border: "1px solid #d0c4e0" }} />
            <span style={{ fontSize: 11, color: "#5a4a70" }}>{l}</span>
          </div>
        ))}
        <span style={{ fontSize: 10, color: "#8a7a9e" }}>{isTouchDevice ? "Tap once to preview, twice to edit" : "Click any slot to view/add wine"}</span>
      </div>

      {/* Rack Layout - floor plan style */}
      <div className="rack-container" style={{ display: "flex", gap: 12, alignItems: "flex-end", flexWrap: "wrap" }}>
        <RackGrid rack="B" label={isMobile ? "B · East" : "Rack B · East Wall"} winesBySlot={winesBySlot} onSelect={handleSlotTap} hoveredSlot={hoveredSlot} setHoveredSlot={setHoveredSlot} align="left" isTouchDevice={isTouchDevice} screen={screen} />
        <RackGrid rack="A" label={isMobile ? "A · South" : "Rack A · South Wall"} winesBySlot={winesBySlot} onSelect={handleSlotTap} hoveredSlot={hoveredSlot} setHoveredSlot={setHoveredSlot} align="right" isTouchDevice={isTouchDevice} screen={screen} />
        <RackGrid rack="C" label={isMobile ? "C · West" : "Rack C · West Wall"} winesBySlot={winesBySlot} onSelect={handleSlotTap} hoveredSlot={hoveredSlot} setHoveredSlot={setHoveredSlot} align="center" isTouchDevice={isTouchDevice} screen={screen} />
        <RackGrid rack="Mag" label="Magnums" winesBySlot={winesBySlot} onSelect={handleSlotTap} hoveredSlot={hoveredSlot} setHoveredSlot={setHoveredSlot} align="center" isTouchDevice={isTouchDevice} screen={screen} />
      </div>

      {/* Tooltip */}
      {hoveredSlot && (() => {
        const wine = winesBySlot[slotKey(hoveredSlot.rack, hoveredSlot.row, hoveredSlot.col)];
        const tx = isTouchDevice ? "50%" : Math.min(tooltipPos.x + 16, window.innerWidth - 280);
        const ty = isTouchDevice ? "auto" : Math.max(tooltipPos.y - 10, 10);
        const touchStyle = isTouchDevice ? { position: "fixed", left: "50%", bottom: 20, transform: "translateX(-50%)", pointerEvents: "none", zIndex: 9000 } : { position: "fixed", left: tx, top: ty, pointerEvents: "none", zIndex: 9000 };
        return (
          <div style={{ ...touchStyle, background: "#ffffffee", border: "1px solid #d0c4e0", borderRadius: 8, padding: "10px 14px", maxWidth: 280, boxShadow: "0 8px 24px rgba(80,40,120,0.2)", backdropFilter: "blur(6px)" }}>
            <div style={{ fontSize: 11, color: "#8a7a9e", marginBottom: 4 }}>{fmtLoc(hoveredSlot.rack, hoveredSlot.row, hoveredSlot.col)}</div>
            {wine ? (<>
              {wine.labelImageUrl && <img src={wine.labelImageUrl} alt="" style={{ maxWidth: 120, maxHeight: 80, borderRadius: 6, marginBottom: 6, display: "block" }} onError={e => e.target.style.display="none"} />}
              <div style={{ fontWeight: 600, color: "#2a2040", fontSize: 14 }}>{wine.producer || "Unknown Producer"}</div>
              {wine.vineyard && <div style={{ fontSize: 12, color: "#5a4a70" }}>{wine.vineyard}</div>}
              <div style={{ fontSize: 12, color: "#7a6a8e", marginTop: 2 }}>
                {[wine.vintage, wine.grape, wine.region, wine.country].filter(Boolean).join(" · ") || "No details"}
              </div>
              {wine.cellarTrackerRating && <div style={{ fontSize: 12, color: "#5a2890", fontWeight: 600, marginTop: 3 }}>CT: {wine.cellarTrackerRating}</div>}
              {wine.pricePaid && <div style={{ fontSize: 11, color: "#8a7a9e", marginTop: 2 }}>Paid: {wine.pricePaid}</div>}
              {wine.marketPrice && <div style={{ fontSize: 11, color: "#8a7a9e" }}>Market: {wine.marketPrice}</div>}
            </>) : (<div style={{ color: "#8a7a9e", fontSize: 12, fontStyle: "italic" }}>Empty — click to add</div>)}
          </div>
        );
      })()}
    </div>
  );
}

function RackGrid({ rack, label, winesBySlot, onSelect, hoveredSlot, setHoveredSlot, align, isTouchDevice, screen }) {
  const maxRow = RACK_ROWS[rack];
  const gap = 1;
  const rows = [];
  const isMobile = screen.isMobile;
  const isTablet = screen.isTablet;

  // Count wines in this rack
  let rackCount = 0;
  let rackTotal = 0;
  for (let r = 1; r <= maxRow; r++) {
    const cols = getColumnsForRow(rack, r);
    rackTotal += cols;
    for (let c = 1; c <= cols; c++) {
      if (winesBySlot[slotKey(rack, r, c)]) rackCount++;
    }
  }

  // Responsive cell sizing — fit within screen width
  // Rack A has max 22 cols, so on a ~390px phone: (390 - 40 padding) / 22 = ~15px per cell
  const maxCols = rack === "A" ? 22 : rack === "B" ? 10 : rack === "C" ? 4 : 2;
  const availableWidth = isMobile ? screen.w - 50 : isTablet ? screen.w - 80 : 1400;
  const cellW = isMobile ? Math.min(Math.floor(availableWidth / maxCols) - gap, 24) : isTablet ? 44 : 58;
  const cellH = isMobile ? Math.min(cellW, 18) : isTablet ? 26 : 32;

  for (let r = maxRow; r >= 1; r--) {
    const cols = getColumnsForRow(rack, r);
    const cells = [];
    for (let c = 1; c <= cols; c++) {
      const key = slotKey(rack, r, c);
      const wine = winesBySlot[key];
      const isHovered = hoveredSlot && hoveredSlot.rack === rack && hoveredSlot.row === r && hoveredSlot.col === c;
      const wc = wine ? wineColor(wine) : null;
      const shortLabel = wine
        ? (wine.producer ? wine.producer.substring(0, 8) : "?") + (wine.vintage ? " '" + String(wine.vintage).slice(-2) : "")
        : "";
      const ctRating = wine && wine.cellarTrackerRating ? String(wine.cellarTrackerRating).trim() : "";
      cells.push(
        <div key={key} onClick={() => onSelect(rack, r, c)}
          onMouseEnter={() => !isTouchDevice && setHoveredSlot({ rack, row: r, col: c })}
          onMouseLeave={() => !isTouchDevice && setHoveredSlot(null)}
          title={wine ? `${fmtLoc(rack, r, c)} — ${wine.producer} ${wine.vintage || ""}`.trim() : `${fmtLoc(rack, r, c)} (empty)`}
          style={{
            width: cellW, height: cellH, borderRadius: 4,
            background: wine ? "#ffffff" : "#0d0d18",
            border: isHovered ? "2px solid #f0d050" : wine ? `2px solid ${wc}` : "1px solid #2a2545",
            cursor: "pointer", transition: "all 0.12s ease",
            boxShadow: isHovered ? "0 0 12px rgba(201,176,55,0.5)" : wine ? `0 1px 3px rgba(0,0,0,0.4)` : "none",
            zIndex: isHovered ? 10 : 1, position: "relative",
            display: "flex", alignItems: "center", justifyContent: "center",
            overflow: "hidden", padding: "1px 2px",
          }}>
          {wine ? (
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", width: "100%", overflow: "hidden" }}>
              {!isMobile && <span style={{ fontSize: isTablet ? 7 : 8, color: "#1a1a1a", textAlign: "center", lineHeight: "10px", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", width: "100%", fontWeight: 600, letterSpacing: 0.3 }}>
                {shortLabel}
              </span>}
              {ctRating && !isMobile && <span style={{ fontSize: 7, color: "#5a2890", fontWeight: 700, lineHeight: "8px", marginTop: 1 }}>{ctRating}</span>}
            </div>
          ) : (
            !isMobile && <span style={{ fontSize: 7, color: "rgba(255,255,255,0.5)" }}>{c}</span>
          )}
        </div>
      );
    }
    rows.push(
      <div key={r} style={{ display: "flex", gap, justifyContent: align === "center" ? "center" : align === "left" ? "flex-start" : "flex-end", alignItems: "center" }}>
        <span style={{ fontSize: isMobile ? 7 : 9, color: "#8a7a9e", width: isMobile ? 12 : 18, textAlign: "right", marginRight: isMobile ? 1 : 3, flexShrink: 0, fontWeight: 500 }}>{r}</span>
        {cells}
      </div>
    );
  }

  return (
    <div style={{ background: "#f4f0fa", border: "1px solid #d0c4e0", borderRadius: isMobile ? 8 : 12, padding: isMobile ? 6 : 14, overflowX: "auto", WebkitOverflowScrolling: "touch", width: "100%" }}>
      <div style={{ textAlign: "center", marginBottom: isMobile ? 4 : 8 }}>
        <div style={{ fontSize: isMobile ? 12 : 14, fontWeight: 600, color: "#5a2890" }}>{label}</div>
        <div style={{ fontSize: isMobile ? 9 : 10, color: "#8a7a9e" }}>{rackCount}/{rackTotal} filled</div>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap, minWidth: "fit-content" }}>{rows}</div>
      {/* Column numbers along the bottom */}
      {!isMobile && <div style={{ display: "flex", gap, justifyContent: align === "center" ? "center" : align === "left" ? "flex-start" : "flex-end", marginTop: 3 }}>
        <span style={{ width: 18, marginRight: 3, flexShrink: 0 }}></span>
        {Array.from({ length: getColumnsForRow(rack, 1) }, (_, i) => (
          <div key={i} style={{ width: cellW, textAlign: "center", fontSize: 8, color: "#8a7a9e", fontWeight: 500 }}>{String(i + 1).padStart(2, "0")}</div>
        ))}
      </div>}
    </div>
  );
}

// ─── Wine Modal ───────────────────────────────────────────────────
function WineModal({ slot, wine, onSave, onDelete, onClose, apiKey }) {
  const [form, setForm] = useState(wine || emptyWine(slot.rack, slot.row, slot.col));
  const [scanning, setScanning] = useState(false);
  const [scanError, setScanError] = useState(null);
  const [previewImg, setPreviewImg] = useState(null);
  const isNew = !wine;
  const update = (k, v) => setForm(p => ({ ...p, [k]: v }));

  const handleScanLabel = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!apiKey) { setScanError("Set your Anthropic API key in Settings (gear icon) first."); return; }
    setScanError(null);
    setScanning(true);

    // Show preview
    const previewUrl = URL.createObjectURL(file);
    setPreviewImg(previewUrl);

    try {
      const { base64, mimeType } = await fileToBase64(file);
      const result = await analyzeWineLabel(apiKey, base64, mimeType);
      // Auto-fill form fields from result, preserving any manually entered data
      const fillable = ["producer","vineyard","vintage","grape","region","country","provenance"];
      setForm(prev => {
        const next = { ...prev };
        fillable.forEach(k => { if (result[k] && !prev[k]) next[k] = result[k]; });
        // Also save the image as a data URL for the label
        next.labelImageUrl = `data:${mimeType};base64,${base64}`;
        return next;
      });
    } catch (err) {
      setScanError(err.message || "Failed to analyze label.");
    } finally {
      setScanning(false);
    }
  };

  const fields = [
    { key: "producer", label: "Producer" }, { key: "vineyard", label: "Vineyard" },
    { key: "vintage", label: "Vintage" }, { key: "grape", label: "Grape / Varietal" },
    { key: "region", label: "Region" }, { key: "country", label: "Country" },
    { key: "provenance", label: "Provenance" }, { key: "pricePaid", label: "Price Paid" },
    { key: "marketPrice", label: "Market Price" }, { key: "cellarTrackerRating", label: "CellarTracker Rating" },
  ];

  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(80,40,120,0.3)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 10000, backdropFilter: "blur(4px)" }}>
      <div onClick={e => e.stopPropagation()} style={{ background: "#ffffff", border: "1px solid #d0c4e0", borderRadius: 16, padding: "20px 16px", width: "95vw", maxWidth: 540, maxHeight: "90vh", overflowY: "auto", boxShadow: "0 20px 60px rgba(80,40,120,0.2)", WebkitOverflowScrolling: "touch" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "start", marginBottom: 20 }}>
          <div>
            <h2 style={{ margin: 0, fontSize: 20, color: "#2a2040" }}>{isNew ? "Add Wine" : (form.producer || "Wine Details")}</h2>
            <span style={{ fontSize: 12, color: "#8a7a9e" }}>{fmtLoc(slot.rack, slot.row, slot.col)}</span>
          </div>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "#8a7a9e", cursor: "pointer", fontSize: 22, padding: "0 4px" }}>✕</button>
        </div>

        {/* Label Scanner */}
        <div style={{ marginBottom: 16, padding: 16, background: "#faf8f0", border: "1px solid #e8e0d0", borderRadius: 10 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: scanning ? 10 : 0 }}>
            <label style={{ ...btnStyle("#722f37", "#ffffff"), display: "inline-flex", alignItems: "center", gap: 6, cursor: scanning ? "wait" : "pointer", opacity: scanning ? 0.6 : 1, padding: "8px 16px" }}>
              📷 {scanning ? "Analyzing..." : "Scan Wine Label"}
              <input type="file" accept="image/*" capture="environment" onChange={handleScanLabel} disabled={scanning} style={{ display: "none" }} />
            </label>
            <span style={{ fontSize: 12, color: "#8a7a9e" }}>
              {apiKey ? "Take a photo or upload an image of the label" : "Set API key in ⚙ Settings first"}
            </span>
          </div>
          {scanning && (
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <div style={{ width: 16, height: 16, border: "2px solid #722f37", borderTopColor: "transparent", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
              <span style={{ fontSize: 13, color: "#5a4a70" }}>Claude is reading the label...</span>
            </div>
          )}
          {scanError && <div style={{ marginTop: 8, fontSize: 12, color: "#d03030", background: "#fef0f0", padding: "6px 10px", borderRadius: 6 }}>{scanError}</div>}
          {previewImg && !scanning && (
            <div style={{ marginTop: 10, textAlign: "center" }}>
              <img src={previewImg} alt="Label scan" style={{ maxWidth: "100%", maxHeight: 120, borderRadius: 8, border: "1px solid #e0d8d0" }} />
            </div>
          )}
        </div>

        {form.labelImageUrl && (
          <div style={{ marginBottom: 16, textAlign: "center", background: "#f4f0fa", borderRadius: 10, padding: 12 }}>
            <img src={form.labelImageUrl} alt="Label" style={{ maxWidth: "100%", maxHeight: 200, borderRadius: 8 }} onError={e => e.target.style.display = "none"} />
          </div>
        )}

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          {fields.map(f => (
            <div key={f.key}>
              <label style={labelStyle}>{f.label}</label>
              <input value={form[f.key]} onChange={e => update(f.key, e.target.value)} style={inputStyle} placeholder={f.label} />
            </div>
          ))}
        </div>

        <div style={{ marginTop: 12 }}>
          <label style={labelStyle}>Label Image URL</label>
          <input value={form.labelImageUrl} onChange={e => update("labelImageUrl", e.target.value)} style={inputStyle} placeholder="https://..." />
        </div>
        <div style={{ marginTop: 12 }}>
          <label style={labelStyle}>Notes</label>
          <textarea value={form.notes} onChange={e => update("notes", e.target.value)} style={{ ...inputStyle, minHeight: 60, resize: "vertical" }} placeholder="Tasting notes, drinking window..." />
        </div>

        <div style={{ display: "flex", gap: 10, marginTop: 22, justifyContent: "flex-end" }}>
          {!isNew && <button onClick={() => { if (confirm("Remove this wine from the cellar?")) onDelete(wine.id); }} style={btnStyle("#fef0f0", "#d03030")}>Remove</button>}
          <button onClick={onClose} style={btnStyle("#f0eef4", "#7a6a8e")}>Cancel</button>
          <button onClick={() => onSave(form)} style={{ ...btnStyle("#5a2890", "#ffffff"), padding: "8px 20px", fontSize: 13 }}>
            {isNew ? "Add Wine" : "Save Changes"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Table View ───────────────────────────────────────────────────
function TableView({ wines, searchTerm, setSearchTerm, searchField, setSearchField, onSelect, screen }) {
  const [sortCol, setSortCol] = useState("location");
  const [sortDir, setSortDir] = useState("asc");

  const handleSort = (col) => {
    if (sortCol === col) setSortDir(d => d === "asc" ? "desc" : "asc");
    else { setSortCol(col); setSortDir("asc"); }
  };

  const sorted = useMemo(() => {
    return [...wines].sort((a, b) => {
      let va, vb;
      if (sortCol === "location") {
        va = fmtLoc(a.rack, a.row, a.col); vb = fmtLoc(b.rack, b.row, b.col);
      } else {
        va = a[sortCol] || ""; vb = b[sortCol] || "";
        if (["vintage"].includes(sortCol)) { va = Number(va) || 0; vb = Number(vb) || 0; }
        else { va = String(va).toLowerCase(); vb = String(vb).toLowerCase(); }
      }
      if (va < vb) return sortDir === "asc" ? -1 : 1;
      if (va > vb) return sortDir === "asc" ? 1 : -1;
      return 0;
    });
  }, [wines, sortCol, sortDir]);

  const allColumns = [
    { key: "location", label: "Loc", w: 65, mobile: true }, { key: "producer", label: "Producer", w: 150, mobile: true },
    { key: "vineyard", label: "Vineyard", w: 130 }, { key: "vintage", label: "Yr", w: 50, mobile: true },
    { key: "grape", label: "Grape", w: 120 }, { key: "region", label: "Region", w: 100 },
    { key: "country", label: "Country", w: 80 }, { key: "pricePaid", label: "Paid", w: 70 },
    { key: "marketPrice", label: "Mkt", w: 55, mobile: true }, { key: "cellarTrackerRating", label: "CT", w: 40 },
  ];
  const columns = screen.isMobile ? allColumns.filter(c => c.mobile) : allColumns;

  const searchOpts = [{ value: "all", label: "All Fields" }, ...allColumns.map(c => ({ value: c.key, label: c.label }))];

  return (
    <div>
      <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap", alignItems: "center" }}>
        <select value={searchField} onChange={e => setSearchField(e.target.value)} style={{ ...inputStyle, width: screen.isMobile ? "100%" : 150 }}>
          {searchOpts.map(f => <option key={f.value} value={f.value}>{f.label}</option>)}
        </select>
        <input placeholder="Search wines..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} style={{ ...inputStyle, width: screen.isMobile ? "100%" : 300 }} />
        <span style={{ fontSize: 12, color: "#8a7a9e" }}>{sorted.length} wine{sorted.length !== 1 ? "s" : ""}</span>
      </div>

      <div style={{ overflowX: "auto", borderRadius: 12, border: "1px solid #d0c4e0" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
          <thead>
            <tr>{columns.map(c => (
              <th key={c.key} onClick={() => handleSort(c.key)}
                style={{ padding: "11px 8px", textAlign: "left", background: "#f4f0fa", color: "#5a2890", cursor: "pointer", borderBottom: "2px solid #d0c4e0", fontSize: 11, textTransform: "uppercase", letterSpacing: 0.5, whiteSpace: "nowrap", userSelect: "none", minWidth: c.w, position: "sticky", top: 0, zIndex: 5 }}>
                {c.label}{sortCol === c.key ? (sortDir === "asc" ? " ▲" : " ▼") : ""}
              </th>
            ))}</tr>
          </thead>
          <tbody>
            {sorted.length === 0 && (
              <tr><td colSpan={columns.length} style={{ padding: 50, textAlign: "center", color: "#8a7a9e", fontStyle: "italic" }}>
                {searchTerm ? "No wines match your search." : "No wines yet — add some via the Visual Cellar or Add/Search tab."}
              </td></tr>
            )}
            {sorted.map(w => (
              <tr key={w.id} onClick={() => onSelect({ rack: w.rack, row: w.row, col: w.col })}
                style={{ cursor: "pointer" }}
                onMouseEnter={e => e.currentTarget.style.background = "#f4f0fa"}
                onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                {columns.map(c => (
                  <td key={c.key} style={{ padding: "8px", borderBottom: "1px solid #e8e0f0", color: c.key === "producer" ? "#2a2040" : c.key === "location" ? "#5a2890" : "#5a4a70", fontWeight: c.key === "producer" || c.key === "location" ? 500 : 400, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", maxWidth: c.w, fontFamily: c.key === "location" ? "monospace" : "inherit" }}>
                    {c.key === "location" ? fmtLoc(w.rack, w.row, w.col) : (w[c.key] || "—")}
                  </td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── Add / Search View ────────────────────────────────────────────
function ManageView({ wines, setWine, removeWine, winesBySlot, searchTerm, setSearchTerm, searchField, setSearchField, filteredWines, onSelect, apiKey, screen }) {
  const [form, setForm] = useState({ rack: "A", row: "1", col: "1", producer: "", vineyard: "", vintage: "", grape: "", region: "", country: "", provenance: "", pricePaid: "", marketPrice: "", cellarTrackerRating: "", labelImageUrl: "", notes: "" });
  const [msg, setMsg] = useState(null);
  const [scanning, setScanning] = useState(false);

  const update = (k, v) => setForm(p => ({ ...p, [k]: v }));

  const handleScanLabel = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!apiKey) { setMsg({ t: "e", text: "Set your Anthropic API key in ⚙ Settings first." }); return; }
    setMsg(null); setScanning(true);
    try {
      const { base64, mimeType } = await fileToBase64(file);
      const result = await analyzeWineLabel(apiKey, base64, mimeType);
      setForm(prev => {
        const next = { ...prev };
        ["producer","vineyard","vintage","grape","region","country","provenance"].forEach(k => { if (result[k]) next[k] = result[k]; });
        next.labelImageUrl = `data:${mimeType};base64,${base64}`;
        return next;
      });
      setMsg({ t: "s", text: "Label scanned! Review the fields below and adjust if needed." });
    } catch (err) {
      setMsg({ t: "e", text: "Scan failed: " + (err.message || "Unknown error") });
    } finally { setScanning(false); }
  };
  const maxCol = getColumnsForRow(form.rack, Number(form.row) || 1);
  const maxRow = RACK_ROWS[form.rack];

  const handleAdd = () => {
    const row = Number(form.row), col = Number(form.col);
    if (!form.rack || row < 1 || row > maxRow || col < 1 || col > maxCol) {
      setMsg({ t: "e", text: "Invalid rack position. Check row/col ranges." }); return;
    }
    if (winesBySlot[slotKey(form.rack, row, col)]) {
      setMsg({ t: "e", text: `Slot ${fmtLoc(form.rack, row, col)} is occupied! Click it in the search results to edit.` }); return;
    }
    const wine = { ...emptyWine(form.rack, row, col) };
    ["producer","vineyard","vintage","grape","region","country","provenance","pricePaid","marketPrice","cellarTrackerRating","labelImageUrl","notes"].forEach(k => wine[k] = form[k]);
    setWine(wine);
    setMsg({ t: "s", text: `Added "${form.producer || "wine"}" at ${fmtLoc(form.rack, row, col)}` });
    // Auto-advance column
    const nextCol = col < maxCol ? col + 1 : 1;
    const nextRow = col < maxCol ? row : Math.min(row + 1, maxRow);
    setForm(p => ({ ...p, producer: "", vineyard: "", vintage: "", grape: "", region: "", country: "", provenance: "", pricePaid: "", marketPrice: "", cellarTrackerRating: "", labelImageUrl: "", notes: "", row: String(nextRow), col: String(nextCol) }));
  };

  const searchOpts = [
    { value: "all", label: "All Fields" }, { value: "producer", label: "Producer" },
    { value: "vineyard", label: "Vineyard" }, { value: "vintage", label: "Vintage" },
    { value: "grape", label: "Grape" }, { value: "region", label: "Region" },
    { value: "country", label: "Country" }, { value: "rack", label: "Rack" },
  ];

  const addFields = [
    { k: "producer", l: "Producer *" }, { k: "vineyard", l: "Vineyard" },
    { k: "vintage", l: "Vintage" }, { k: "grape", l: "Grape / Varietal" },
    { k: "region", l: "Region" }, { k: "country", l: "Country" },
    { k: "provenance", l: "Provenance" }, { k: "pricePaid", l: "Price Paid" },
    { k: "marketPrice", l: "Market Price" }, { k: "cellarTrackerRating", l: "CT Rating" },
  ];

  return (
    <div className="manage-layout" style={{ display: "flex", gap: 20, flexWrap: "wrap" }}>
      {/* Add Wine Panel */}
      <div style={{ flex: "1 1 340px", background: "#ffffff", border: "1px solid #d0c4e0", borderRadius: 12, padding: "18px 16px" }}>
        <h3 style={{ margin: "0 0 16px", fontSize: 17, color: "#5a2020", display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 20 }}>➕</span> Add Wine
        </h3>

        {/* Scan Label */}
        <div style={{ marginBottom: 14, padding: 12, background: "#faf8f0", border: "1px solid #e8e0d0", borderRadius: 8, display: "flex", alignItems: "center", gap: 10 }}>
          <label style={{ ...btnStyle("#722f37", "#ffffff"), display: "inline-flex", alignItems: "center", gap: 6, cursor: scanning ? "wait" : "pointer", opacity: scanning ? 0.6 : 1, padding: "7px 14px", flexShrink: 0 }}>
            📷 {scanning ? "Scanning..." : "Scan Label"}
            <input type="file" accept="image/*" capture="environment" onChange={handleScanLabel} disabled={scanning} style={{ display: "none" }} />
          </label>
          <span style={{ fontSize: 11, color: "#8a7a9e" }}>
            {scanning ? "Claude is reading the label..." : "Photo-fill the fields below"}
          </span>
          {scanning && <div style={{ width: 14, height: 14, border: "2px solid #722f37", borderTopColor: "transparent", borderRadius: "50%", animation: "spin 0.8s linear infinite", flexShrink: 0 }} />}
        </div>

        {msg && (
          <div style={{ marginBottom: 14, padding: "10px 14px", borderRadius: 8, fontSize: 13,
            background: msg.t === "e" ? "#fef0f0" : "#f0fef0",
            color: msg.t === "e" ? "#d03030" : "#207020",
            border: `1px solid ${msg.t === "e" ? "#e0c0c0" : "#c0e0c0"}` }}>
            {msg.text}
          </div>
        )}

        {/* Location selector */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 16 }}>
          <div>
            <label style={labelStyle}>Rack</label>
            <select value={form.rack} onChange={e => { update("rack", e.target.value); update("row", "1"); update("col", "1"); }} style={inputStyle}>
              {RACKS.map(r => <option key={r} value={r}>Rack {r}</option>)}
            </select>
          </div>
          <div>
            <label style={labelStyle}>Row (1–{maxRow})</label>
            <input type="number" min={1} max={maxRow} value={form.row}
              onChange={e => { update("row", e.target.value); const mc = getColumnsForRow(form.rack, Number(e.target.value)||1); if (Number(form.col) > mc) update("col", String(mc)); }}
              style={inputStyle} />
          </div>
          <div>
            <label style={labelStyle}>Col (1–{maxCol})</label>
            <input type="number" min={1} max={maxCol} value={form.col} onChange={e => update("col", e.target.value)} style={inputStyle} />
          </div>
        </div>

        {/* Slot status indicator */}
        {(() => {
          const r = Number(form.row), c = Number(form.col);
          if (r >= 1 && r <= maxRow && c >= 1 && c <= maxCol) {
            const occupied = winesBySlot[slotKey(form.rack, r, c)];
            return <div style={{ marginBottom: 12, fontSize: 12, color: occupied ? "#d03030" : "#207020" }}>
              {occupied ? `⚠ Slot occupied by: ${occupied.producer || "Unknown"}` : "✓ Slot available"}
            </div>;
          }
          return null;
        })()}

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
          {addFields.map(f => (
            <div key={f.k}>
              <label style={labelStyle}>{f.l}</label>
              <input value={form[f.k]} onChange={e => update(f.k, e.target.value)} style={inputStyle} placeholder={f.l.replace(" *", "")} />
            </div>
          ))}
        </div>
        <div style={{ marginBottom: 12 }}>
          <label style={labelStyle}>Label Image URL</label>
          <input value={form.labelImageUrl} onChange={e => update("labelImageUrl", e.target.value)} style={inputStyle} placeholder="https://..." />
        </div>
        <div style={{ marginBottom: 16 }}>
          <label style={labelStyle}>Notes</label>
          <textarea value={form.notes} onChange={e => update("notes", e.target.value)} style={{ ...inputStyle, minHeight: 50, resize: "vertical" }} placeholder="Tasting notes, drinking window..." />
        </div>

        <button onClick={handleAdd} style={{ ...btnStyle("#722f37", "#ffffff"), width: "100%", padding: "11px", fontSize: 14, fontWeight: 600 }}>
          Add Wine to Cellar
        </button>
      </div>

      {/* Search Panel */}
      <div style={{ flex: "1 1 340px", background: "#ffffff", border: "1px solid #d0c4e0", borderRadius: 12, padding: "18px 16px" }}>
        <h3 style={{ margin: "0 0 16px", fontSize: 17, color: "#5a2020", display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 20 }}>🔍</span> Search Wines
        </h3>

        <div style={{ display: "flex", gap: 10, marginBottom: 14 }}>
          <select value={searchField} onChange={e => setSearchField(e.target.value)} style={{ ...inputStyle, width: 140 }}>
            {searchOpts.map(f => <option key={f.value} value={f.value}>{f.label}</option>)}
          </select>
          <input placeholder="Type to search..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} style={inputStyle} />
        </div>

        <div style={{ fontSize: 12, color: "#8a7a9e", marginBottom: 10 }}>
          {filteredWines.length} result{filteredWines.length !== 1 ? "s" : ""}
          {searchTerm && <button onClick={() => setSearchTerm("")} style={{ marginLeft: 8, background: "none", border: "none", color: "#722f37", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>Clear</button>}
        </div>

        <div style={{ maxHeight: 540, overflowY: "auto" }}>
          {filteredWines.length === 0 && <div style={{ padding: 20, color: "#8a7a9e", fontStyle: "italic", fontSize: 13, textAlign: "center" }}>{searchTerm ? "No matches." : "No wines yet."}</div>}
          {filteredWines.slice(0, 200).map(w => (
            <div key={w.id} onClick={() => onSelect({ rack: w.rack, row: w.row, col: w.col })}
              style={{ padding: "10px 12px", borderBottom: "1px solid #e8e0f0", cursor: "pointer", borderRadius: 6, transition: "background 0.1s" }}
              onMouseEnter={e => e.currentTarget.style.background = "#f8f4fc"}
              onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                <span style={{ fontWeight: 600, color: "#2a2040", fontSize: 14 }}>{w.producer || "Unknown"}</span>
                <span style={{ fontSize: 11, color: "#7a6a8e", flexShrink: 0, marginLeft: 10, background: "#f4f0fa", padding: "2px 8px", borderRadius: 10, border: "1px solid #d0c4e0" }}>
                  {fmtLoc(w.rack, w.row, w.col)}
                </span>
              </div>
              <div style={{ fontSize: 12, color: "#7a6a8e", marginTop: 2 }}>
                {[w.vineyard, w.vintage, w.grape, w.region, w.country].filter(Boolean).join(" · ") || "No details entered"}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── Mount ────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

// Register service worker for PWA / offline support
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js')
      .then(function(reg) { console.log('SW registered:', reg.scope); })
      .catch(function(err) { console.log('SW registration failed:', err); });
  });
}
